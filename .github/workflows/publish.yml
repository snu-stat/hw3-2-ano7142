name: Quarto Publish (R & Custom Packages) + GHCR Image

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # gh-pages 배포에 필요
      packages: write   # GHCR(ghcr.io) 이미지 푸시에 필요 (숙제 3 추가)

    steps:
      # GitHub-hosted Ubuntu 러너는 디스크가 ~14GB 뿐이라 R/Python/Docker 빌드를
      # 모두 하면 'No space left on device' 가 자주 발생한다.
      # 사용하지 않는 사전설치 SW(Android SDK, .NET, Haskell 등) 를 지워
      # 약 28GB의 여유 공간을 확보한다.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false       # actions/setup-* 의 캐시는 보존
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false    # Docker 데몬·기본 이미지는 보존
          swap-storage: true

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.10'
          activate-environment: r-reticulate
          channels: conda-forge,defaults

      - name: Install Python dependencies via Conda
        run: |
          conda install -n r-reticulate -y \
            numpy \
            pandas \
            matplotlib \
            polars \
            statsmodels \
            scipy \
            patsy

          conda run -n r-reticulate pip install \
            plotnine \
            pylahman \
            pybabynames \
            session-info \
            patchworklib
        shell: bash -l {0}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R Packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          install.packages(c(
            "reticulate",
            "knitr",
            "rmarkdown",
            "tidyverse",
            "mdsr",
            "Lahman",
            "NHANES",
            "babynames",
            "mosaicData",
            "broom",
            "boot",
            "ggrepel",
            "patchwork"
          ), dependencies = TRUE)

          library(reticulate)
          library(knitr)
          library(rmarkdown)
          library(tidyverse)
          library(mdsr)
          library(Lahman)
          library(NHANES)
          library(babynames)
          library(mosaicData)
          library(broom)
          library(ggrepel)
          library(patchwork)
        shell: Rscript {0}

      - name: Prepare README as Index
        run: cp README.md index.md

      - name: Render Quarto
        run: |
          CONDA_ENV="$(conda info --base)/envs/r-reticulate"
          export RETICULATE_PYTHON="$CONDA_ENV/bin/python"
          # Force conda's libexpat to load before the older system one
          # (LD_LIBRARY_PATH was insufficient — possibly overridden by an
          # RPATH on pyexpat.so or by conda activation scripts).
          export LD_PRELOAD="$CONDA_ENV/lib/libexpat.so.1"
          quarto render
        shell: bash -l {0}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages

      # ============================================================
      # 숙제 3 추가 단계: Dockerfile을 빌드해서 GHCR에 이미지를 푸시
      # (이 이미지를 mybinder.org가 가져와 .ipynb를 온라인으로 실행)
      # ============================================================

      # gh-pages 배포가 끝났으므로 렌더 산출물·캐시를 정리해 디스크 확보
      - name: Reclaim disk before Docker build
        run: |
          echo "==== before cleanup ===="
          df -h
          sudo rm -rf _site _freeze "$HOME/.cache" "$HOME/.local/share/Trash" || true
          docker system prune -af --volumes || true
          echo "==== after cleanup ===="
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/my-r-env:latest
