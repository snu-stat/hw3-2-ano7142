name: Quarto Publish (R & Custom Packages) + GHCR Image

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # gh-pages 배포에 필요
      packages: write   # GHCR(ghcr.io) 이미지 푸시에 필요 (숙제 3 추가)

    steps:
      # GitHub-hosted Ubuntu 러너는 디스크가 ~14GB 뿐이라 R/Python/Docker 빌드를
      # 모두 하면 'No space left on device' 가 자주 발생한다.
      # 사용하지 않는 사전설치 SW(Android SDK, .NET, Haskell 등) 를 지워
      # 약 28GB의 여유 공간을 확보한다.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false       # actions/setup-* 의 캐시는 보존
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false    # Docker 데몬·기본 이미지는 보존
          swap-storage: true

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.10'
          activate-environment: r-reticulate
          channels: conda-forge,defaults

      - name: Install Python dependencies via Conda
        run: |
          conda install -n r-reticulate -y \
            numpy \
            pandas \
            matplotlib \
            polars \
            statsmodels \
            scipy \
            patsy

          conda run -n r-reticulate pip install \
            plotnine \
            pylahman \
            pybabynames \
            session-info \
            patchworklib
        shell: bash -l {0}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R Packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          install.packages(c(
            "reticulate",
            "knitr",
            "rmarkdown",
            "tidyverse",
            "mdsr",
            "Lahman",
            "NHANES",
            "babynames",
            "mosaicData",
            "broom",
            "boot",
            "ggrepel",
            "patchwork"
          ), dependencies = TRUE)

          library(reticulate)
          library(knitr)
          library(rmarkdown)
          library(tidyverse)
          library(mdsr)
          library(Lahman)
          library(NHANES)
          library(babynames)
          library(mosaicData)
          library(broom)
          library(ggrepel)
          library(patchwork)
        shell: Rscript {0}

      - name: Prepare README as Index
        run: cp README.md index.md

      - name: Render Quarto
        run: |
          CONDA_ENV="$(conda info --base)/envs/r-reticulate"
          export RETICULATE_PYTHON="$CONDA_ENV/bin/python"
          # Force conda's libexpat to load before the older system one
          # (LD_LIBRARY_PATH was insufficient — possibly overridden by an
          # RPATH on pyexpat.so or by conda activation scripts).
          export LD_PRELOAD="$CONDA_ENV/lib/libexpat.so.1"
          quarto render
        shell: bash -l {0}

      # Binder(repo2docker)는 빌드 대상 브랜치 루트에서 환경 명세를 찾는다.
      # gh-pages 에는 렌더 산출물(_site)만 배포되므로, 환경 명세인
      # requirements.txt 를 _site 에 함께 복사해 gh-pages 루트에 포함시킨다.
      # (이게 없으면 'No environment specification found' 로 Binder 빌드 실패)
      - name: Add Binder (repo2docker) config to site
        run: cp requirements.txt _site/requirements.txt

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages

      # ============================================================
      # 숙제 3 추가 단계: Dockerfile을 빌드해서 GHCR에 이미지를 푸시
      # (이 이미지를 mybinder.org가 가져와 .ipynb를 온라인으로 실행)
      # ============================================================

      # gh-pages 배포가 끝났으므로 렌더 산출물·캐시를 정리해 디스크 확보
      - name: Reclaim disk before Docker build
        run: |
          echo "==== before cleanup ===="
          df -h
          # Dockerfile 의 'COPY _site/hw03.ipynb' 가 빌드 컨텍스트에서 이 파일을
          # 필요로 하므로 _site 는 지우지 않는다. (이전에는 _site 까지 지워서
          # COPY 가 실패했었다.)  _freeze·캐시·미사용 도커 이미지만 정리한다.
          sudo rm -rf _freeze "$HOME/.cache" "$HOME/.local/share/Trash" || true
          docker system prune -af --volumes || true
          echo "==== after cleanup ===="
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 조직 저장소(snu-stat/...)에서는 모든 학생이 같은 'my-r-env' 이름을
          # 쓰면 패키지가 충돌하여 먼저 만든 저장소만 소유하고 나머지는
          # 'denied: permission_denied: write_package' 가 발생한다.
          # 저장소 전용 이름(github.repository = <owner>/<repo>)을 사용하면
          # 이 저장소가 소유하는 새 패키지로 생성되어 push 권한이 보장되고
          # 다른 제출물과 충돌하지 않는다.  ->  ghcr.io/snu-stat/hw3-2-ano7142:latest
          tags: ghcr.io/${{ github.repository }}:latest
