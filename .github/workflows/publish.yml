name: Quarto Publish (R & Custom Packages) + GHCR Image

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # gh-pages л∞∞нПђмЧР нХДмЪФ
      packages: write   # GHCR(ghcr.io) мЭілѓЄмІА нСЄмЛЬмЧР нХДмЪФ (мИЩм†Ь 3 мґФк∞А)

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.10'
          activate-environment: r-reticulate
          channels: conda-forge,defaults

      - name: Install Python dependencies via Conda
        run: |
          conda install -n r-reticulate -y \
            numpy \
            pandas \
            matplotlib \
            polars \
            statsmodels \
            scipy \
            patsy

          conda run -n r-reticulate pip install \
            plotnine \
            pylahman \
            pybabynames \
            session-info \
            patchworklib
        shell: bash -l {0}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R Packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          install.packages(c(
            "reticulate",
            "knitr",
            "rmarkdown",
            "tidyverse",
            "mdsr",
            "Lahman",
            "NHANES",
            "babynames",
            "mosaicData",
            "broom",
            "boot",
            "ggrepel",
            "patchwork"
          ), dependencies = TRUE)

          library(reticulate)
          library(knitr)
          library(rmarkdown)
          library(tidyverse)
          library(mdsr)
          library(Lahman)
          library(NHANES)
          library(babynames)
          library(mosaicData)
          library(broom)
          library(ggrepel)
          library(patchwork)
        shell: Rscript {0}

      - name: Prepare README as Index
        run: cp README.md index.md

      - name: Render Quarto
        run: |
          CONDA_ENV="$(conda info --base)/envs/r-reticulate"
          export RETICULATE_PYTHON="$CONDA_ENV/bin/python"
          # Force conda's libexpat to load before the older system one
          # (LD_LIBRARY_PATH was insufficient вАФ possibly overridden by an
          # RPATH on pyexpat.so or by conda activation scripts).
          export LD_PRELOAD="$CONDA_ENV/lib/libexpat.so.1"
          quarto render
        shell: bash -l {0}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages

      # ============================================================
      # мИЩм†Ь 3 мґФк∞А лЛ®к≥Д: DockerfileмЭД лєМлУЬнХімДЬ GHCRмЧР мЭілѓЄмІАл•Љ нСЄмЛЬ
      # (мЭі мЭілѓЄмІАл•Љ mybinder.orgк∞А к∞Ам†ЄмЩА .ipynbл•Љ мШ®лЭЉмЭЄмЬЉл°Ь мЛ§нЦЙ)
      # ============================================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/my-r-env:latest
